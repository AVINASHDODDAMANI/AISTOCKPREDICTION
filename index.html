<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Stock Trading Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="style_simple.css" />
  <style>
    [data-chart-container] { display: none; }
    [data-chart-container].active { display: block; }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;display:grid;place-items:center;color:#edf4ff;font-family:Manrope,sans-serif;padding:24px;text-align:center;">
      <div>
        <h1 style="font-family:'Space Grotesk',sans-serif;margin:0 0 12px;">Loading Dashboard...</h1>
        <p style="margin:0;color:#9db2cf;">Initializing AI Stock Prediction UI...</p>
      </div>
    </div>
  </div>

  <!-- Core Libraries -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Main App -->
  <script type="text/babel" data-presets="react" src="app_simple.jsx"></script>
</body>
</html>
